name: Database

on:
  push:
    branches: [ main ]
    paths:
      - 'Gemfile*'
      - '.github/workflows/database.yml'
      - 'FirebaseDatabaseUI/**'
      - 'test.sh'
      - 'FirebaseDatabaseUI.podspec'
      - 'Package.swift'
  pull_request:
    branches: [ main ]
    paths:
      - 'Gemfile*'
      - '.github/workflows/database.yml'
      - 'FirebaseDatabaseUI/**'
      - 'test.sh'
      - 'FirebaseDatabaseUI.podspec'
      - 'Package.swift'

  workflow_dispatch:

jobs:
  xcodebuild:
    name: xcodebuild
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Select Xcode version
        run: |
          sudo xcode-select -switch /Applications/Xcode_26.2.app/Contents/Developer
      - name: Install simulators in case they are missing.
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 5
          retry_wait_seconds: 120
          continue_on_error: true
          command: xcodebuild -downloadPlatform iOS
      - name: Setup
        run: |
          cd FirebaseDatabaseUI
          gem install bundler
          bundle install
          gem install xcpretty
          bundle exec pod install --repo-update
      - name: Build
        run: |
          ./test.sh FirebaseDatabaseUI
  spm:
    name: spm
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Select Xcode version
        run: |
          sudo xcode-select -switch /Applications/Xcode_26.2.app/Contents/Developer
      - name: Install simulators in case they are missing.
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 5
          retry_wait_seconds: 120
          continue_on_error: true
          command: xcodebuild -downloadPlatform iOS
      - name: List
        run: |
          xcodebuild -list
      - name: Build
        run: |
          xcodebuild -scheme FirebaseDatabaseUI -sdk iphonesimulator  -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16 Pro'
  pod:
    name: pod lib lint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Select Xcode version
        run: |
          sudo xcode-select -switch /Applications/Xcode_26.2.app/Contents/Developer
      - name: Install simulators in case they are missing.
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 5
          retry_wait_seconds: 120
          continue_on_error: true
          command: xcodebuild -downloadPlatform iOS
      - name: Setup
        run: gem install bundler; bundle install
      - name: Build
        run: |
          bundle exec pod lib lint FirebaseDatabaseUI.podspec
