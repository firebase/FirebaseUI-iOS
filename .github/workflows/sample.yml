name: Sample

on:
  push:
    branches: [ main ]
    paths:
      - 'Gemfile*'
      - '.github/workflows/sample.yml'
      - 'FirebaseSwiftUI/**'
      - 'Firebase*UI/**'
      - 'samples/**'
      - 'Package.swift'
      - '*.podspec'
  pull_request:
    branches: [ main ]
    paths:
      - 'Gemfile*'
      - '.github/workflows/sample.yml'
      - 'FirebaseSwiftUI/**'
      - 'Firebase*UI/**'
      - 'samples/**'
      - 'Package.swift'
      - '*.podspec'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  swiftui:
    name: SwiftUI Sample build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select Xcode version
        run: |
          sudo xcode-select -switch /Applications/Xcode_26.2.app/Contents/Developer
      - name: Install simulators in case they are missing.
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 5
          retry_wait_seconds: 120
          continue_on_error: true
          command: xcodebuild -downloadPlatform iOS
      - name: Build SwiftUI Sample
        run: |
          cd samples/swiftui/FirebaseSwiftUISample
          xcodebuild \
            -project FirebaseSwiftUISample.xcodeproj \
            -scheme FirebaseSwiftUISample \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17' \
            clean build \
            ONLY_ACTIVE_ARCH=YES

  swift:
    name: Swift UIKit Sample build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select Xcode version
        run: |
          sudo xcode-select -switch /Applications/Xcode_26.2.app/Contents/Developer
      - name: Install simulators in case they are missing.
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 5
          retry_wait_seconds: 120
          continue_on_error: true
          command: xcodebuild -downloadPlatform iOS
      - name: Setup
        run: |
          cp samples/GoogleService-Info-dummy.plist samples/swift/GoogleService-Info.plist
          cd samples/swift
          gem install bundler
          bundle install
          gem install xcpretty
          bundle exec pod install --repo-update
      - name: Build
        run: |
          cd samples/swift
          xcodebuild \
            -workspace FirebaseUI-demo-swift.xcworkspace \
            -scheme FirebaseUI-demo-swift \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17 Pro' \
            clean build test \
            ONLY_ACTIVE_ARCH=YES | xcpretty

  objc:
    name: ObjC Sample build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select Xcode version
        run: |
          sudo xcode-select -switch /Applications/Xcode_26.2.app/Contents/Developer
      - name: Install simulators in case they are missing.
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 5
          retry_wait_seconds: 120
          continue_on_error: true
          command: xcodebuild -downloadPlatform iOS
      - name: Setup
        run: |
          cp samples/GoogleService-Info-dummy.plist samples/objc/GoogleService-Info.plist
          cd samples/objc
          gem install bundler
          bundle install
          gem install xcpretty
          bundle exec pod install --repo-update
      - name: Build
        run: |
          cd samples/objc
          xcodebuild \
            -workspace FirebaseUI-demo-objc.xcworkspace \
            -scheme FirebaseUI-demo-objc \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17 Pro' \
            clean build \
            ONLY_ACTIVE_ARCH=YES | xcpretty
